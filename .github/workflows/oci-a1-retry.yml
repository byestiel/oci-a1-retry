# 아무 의미없는 주석 한 줄 추가해서 push
# triggered: 2025-04-16
name: OCI A1 Retry

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"

jobs:
  try-create-a1:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Write OCI config and key
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

      - name: Check capacity and launch once
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          OCI_AD_NAME: ${{ secrets.OCI_AD_NAME }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          echo "Checking A1 capacity..."

          cat > cap.json <<EOF
          [
            {
              "instanceShape": "VM.Standard.A1.Flex",
              "instanceShapeConfig": {
                "ocpus": 1,
                "memoryInGBs": 6
              }
            }
          ]
          EOF

          CAPACITY_OUTPUT="$(oci compute compute-capacity-report create \
            --availability-domain "$OCI_AD_NAME" \
            --compartment-id "$OCI_TENANCY_OCID" \
            --shape-availabilities file://cap.json \
            --connection-timeout 60 \
            --read-timeout 120 \
            --output json)"

          echo "$CAPACITY_OUTPUT"

          STATUS="$(printf '%s' "$CAPACITY_OUTPUT" | python3 -c 'import sys,json; obj=json.load(sys.stdin); items=obj.get("data",{}).get("shape-availabilities",[]); print((items[0].get("availability-status") if items else "UNKNOWN") or "UNKNOWN")')"

          echo "availability-status=$STATUS"

          if [ "$STATUS" = "OUT_OF_HOST_CAPACITY" ]; then
            echo "No A1 capacity right now. Exit successfully and wait for next schedule."
            exit 0
          fi

          echo "Capacity seems available. Launching instance..."

          INSTANCE_OCID="$(oci compute instance launch \
            --availability-domain "$OCI_AD_NAME" \
            --compartment-id "$OCI_COMPARTMENT_OCID" \
            --display-name "dividend-app-vm" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 1, "memoryInGBs": 6}' \
            --subnet-id "$OCI_SUBNET_OCID" \
            --assign-public-ip true \
            --image-id "$OCI_IMAGE_OCID" \
            --metadata "{\"ssh_authorized_keys\":\"$OCI_SSH_PUBLIC_KEY\"}" \
            --connection-timeout 60 \
            --read-timeout 600 \
            --query 'data.id' \
            --raw-output)"

          echo "INSTANCE_OCID=$INSTANCE_OCID"
