name: OCI A1 Retry

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"  # 혹시 모르니 일요일마다 한번 살려두는 용

concurrency:
  group: oci-a1-retry
  cancel-in-progress: false

jobs:
  try-create-a1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPPRESS_LABEL_WARNING: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Write OCI config and key
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Retry loop
        id: retry
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          OCI_AD_NAME: ${{ secrets.OCI_AD_NAME }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          TARGET_DISPLAY_NAME="dividend-app-a1-vm"
          echo "created=false" >> "$GITHUB_OUTPUT"

          echo "Checking existing A1 instance..."

          INSTANCE_LIST_JSON="$(oci compute instance list \
            --compartment-id "$OCI_COMPARTMENT_OCID" \
            --all \
            --output json)"

          EXISTING_OCID="$(printf '%s' "$INSTANCE_LIST_JSON" | python3 -c '
          import sys, json

          raw = sys.stdin.read().strip()
          if not raw:
              print("")
              sys.exit(0)

          obj = json.loads(raw)
          data = obj.get("data", [])

          for x in data:
              if (
                  x.get("display-name") == "dividend-app-a1-vm"
                  and x.get("shape") == "VM.Standard.A1.Flex"
                  and x.get("lifecycle-state") not in ("TERMINATED", "TERMINATING")
              ):
                  print(x.get("id", ""))
                  break
          ')"

          if [ -n "$EXISTING_OCID" ]; then
            echo "A1 instance already exists: $EXISTING_OCID"
            echo "created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          end_time=$(( $(date +%s) + 7*60 ))

          while [ "$(date +%s)" -lt "$end_time" ]; do
            echo "$(date -u) - Checking A1 capacity..."

            cat > cap.json <<EOF
          [{"instanceShape":"VM.Standard.A1.Flex","instanceShapeConfig":{"ocpus":4,"memoryInGBs":24}}]
          EOF

            CAPACITY_OUTPUT="$(oci compute compute-capacity-report create \
              --availability-domain "$OCI_AD_NAME" \
              --compartment-id "$OCI_COMPARTMENT_OCID" \
              --shape-availabilities file://cap.json \
              --connection-timeout 60 \
              --read-timeout 120 \
              --output json)"

            STATUS="$(printf '%s' "$CAPACITY_OUTPUT" | python3 -c '
          import sys, json

          raw = sys.stdin.read().strip()
          if not raw:
              print("UNKNOWN")
              sys.exit(0)

          obj = json.loads(raw)
          items = obj.get("data", {}).get("shape-availabilities", [])

          if items:
              print(items[0].get("availability-status") or "UNKNOWN")
          else:
              print("UNKNOWN")
          ')"

            echo "Status: $STATUS"

            if [ "$STATUS" = "AVAILABLE" ]; then
              echo "Capacity available! Launching..."

              INSTANCE_OCID="$(oci compute instance launch \
                --availability-domain "$OCI_AD_NAME" \
                --compartment-id "$OCI_COMPARTMENT_OCID" \
                --display-name "$TARGET_DISPLAY_NAME" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config '{"ocpus":4,"memoryInGBs":24}' \
                --subnet-id "$OCI_SUBNET_OCID" \
                --assign-public-ip true \
                --image-id "$OCI_IMAGE_OCID" \
                --metadata "{\"ssh_authorized_keys\":\"$OCI_SSH_PUBLIC_KEY\"}" \
                --connection-timeout 60 \
                --read-timeout 600 \
                --query 'data.id' \
                --raw-output)"

              echo "INSTANCE_OCID=$INSTANCE_OCID"
              echo "created=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "No capacity. Waiting 60s..."
            sleep 60
          done

          echo "7분 동안 자리 못 찾음. 다음 실행에서 다시 시도."

      - name: Re-trigger workflow
        if: ${{ success() && steps.retry.outputs.created != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          sleep 60
          gh workflow run oci-a1-retry.yml --ref main
